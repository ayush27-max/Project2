<!DOCTYPE html>
<html lang="en">
<head>

    <title>weatherio</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="title" content="weatherio">
    <meta name="description" content="Explore accurate and real-time weather information for cities around the world with Weatherio. Get current weather conditions, 5-day forecasts, wind speed, sunrise and sunset times, air quality, humidity, and more.  Stay informed about weather changes effortlessly. Visit Weatherio now!">
    
    <link rel="shortcut icon" href="favicon.svg" type="image/x-icon">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="assest/css/style.css">

        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        
        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
        const firebaseConfig = {

            authDomain: "weatherio-ed8f6.firebaseapp.com",
            projectId: "weatherio-ed8f6",
            storageBucket: "weatherio-ed8f6.firebasestorage.app",
            messagingSenderId: "411386783050",

            window.firebaseAuth = getAuth(app);

    <script type="module" src="./assest/js/app.js"></script>
    <script type="module" src="./assest/js/route.js"></script>
    <script type="module" src="./assest/js/auth.js"></script>
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="" class="logo">
                <img src="assest/images/logo.png" alt="logo">
            </a>
            <div class="search-view" data-search-view>
                <div class="search-wrapper">
                    <input type="search" name="search" class="search-field" placeholder="search city ..." autocomplete="off" data-search-field>
                    <span class="m-icon leading-icon">search</span>
                    <button class="icon-btn leading-icon has-state" aria-label="close search" data-search-toggler>
                        <span class="m-icon">arrow_back</span>
                    </button>
                </div>
                <div class="search-result" data-search-result>
                </div>
            </div>
            <div class="header-actions">
                <button class="icon-btn has-state" aria-label="open search" data-search-toggler>
                    <span class="m-icon">search</span>
                </button>
                <button class="btn-primary has-state" aria-label="sign in" data-auth-btn>
                    <span class="m-icon">account_circle</span>
                    <span class="span" data-auth-btn-text>Sign In</span>
                </button>
                <a href="#/current-location" class="btn-primary has-state" data-current-location-btn>
                    <span class="m-icon">my_location</span>
                    <span class="span">Current Location</span>
                </a>
            </div>
        </div>
    </header>
    <main>
        <article class="container" data-container>
            <div class="content-left">
                <!-- current weater -->
                <section class="section current-weather" aria-label="current weather" data-current-weather></section>
                <!-- forecast -->
                <section class="section forecast" aria-labelledby="forecast-label" data-5-day-forecast></section>
            </div>
            <div class="content-right">
                <!-- highlight -->
                <section class="section highlights" aria-labelledby="highlights-lable" data-highlights></section>
                <section class="section hourly-forecast" aria-label="hourly forecast" data-hourly-forecast></section>
            </div>
            <div class="loading" data-loading>
            </div>
        </article>
    </main>
    <!-- 404 Section -->
    <section class="error-content" data-error-content>
        <h2 class="heading">404</h2>
        <p class="body-1">Page not found!</p>
        <a href="" class="btn-primary">
            <span class="span">Go Home</span>
        </a>
    </section>
    
    <!-- Authentication Modal -->
    <div class="auth-modal" data-auth-modal>
        <div class="auth-modal-overlay" data-auth-modal-overlay></div>
        <div class="auth-modal-content">
            <button class="icon-btn auth-modal-close has-state" aria-label="close modal" data-auth-modal-close>
                <span class="m-icon">close</span>
            </button>
            
            <div class="auth-container">
                <h2 class="title-2 auth-title" data-auth-title>Sign In</h2>
                <p class="body-3 auth-subtitle" data-auth-subtitle>Welcome back! Please sign in to your account.</p>
                
                <form class="auth-form" data-auth-form>
                    <div class="form-group">
                        <label for="auth-email" class="label-1">Email</label>
                        <input 
                            type="email" 
                            id="auth-email" 
                            class="form-input" 
                            placeholder="Enter your email" 
                            required
                            data-auth-email
                        >
                    </div>
                    
                    <div class="form-group">
                        <label for="auth-password" class="label-1">Password</label>
                        <input 
                            type="password" 
                            id="auth-password" 
                            class="form-input" 
                            placeholder="Enter your password" 
                            required
                            data-auth-password
                        >
                    </div>
                    
                    <div class="auth-error" data-auth-error></div>
                    
                    <button type="submit" class="btn-primary auth-submit" data-auth-submit>
                        <span class="span" data-auth-submit-text>Sign In</span>
                    </button>
                </form>
                
                <div class="auth-divider">
                    <span class="auth-divider-line"></span>
                    <span class="auth-divider-text">or continue with</span>
                    <span class="auth-divider-line"></span>
                </div>
                
                <div class="auth-social">
                    <button type="button" class="auth-social-btn google" data-auth-google aria-label="Sign in with Google">
                        <svg class="auth-social-icon" viewBox="0 0 24 24" width="20" height="20">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        <span class="span">Google</span>
                    </button>
                    <button type="button" class="auth-social-btn github" data-auth-github aria-label="Sign in with GitHub">
                        <svg class="auth-social-icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                            <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                        </svg>
                        <span class="span">GitHub</span>
                    </button>
                    <button type="button" class="auth-social-btn microsoft" data-auth-microsoft aria-label="Sign in with Microsoft">
                        <svg class="auth-social-icon" viewBox="0 0 24 24" width="20" height="20">
                            <path fill="#f25022" d="M1 1h10v10H1z"/>
                            <path fill="#00a4ef" d="M13 1h10v10H13z"/>
                            <path fill="#7fba00" d="M1 13h10v10H1z"/>
                            <path fill="#ffb900" d="M13 13h10v10H13z"/>
                        </svg>
                        <span class="span">Microsoft</span>
                    </button>
                </div>
                
                <div class="auth-toggle">
                    <p class="body-3">
                        <span data-auth-toggle-text>Don't have an account?</span>
                        <button type="button" class="auth-link" data-auth-toggle-btn>
                            <span data-auth-toggle-link>Sign Up</span>
                        </button>
                    </p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
